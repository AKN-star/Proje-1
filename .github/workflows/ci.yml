name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Yerel geliştirme Node 24/npm 11; npm 10'un iç içe optional
          # bağımlılıklarda hatalı "lock file out of sync" vermesi nedeniyle
          # CI da aynı ana sürümde tutulur.
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # Testler hermetiktir: DB olarak in-memory PGlite kullanılır, secret gerekmez.
      - run: npm test
